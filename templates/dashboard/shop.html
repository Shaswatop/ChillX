{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shop — ChillX</title>
<link rel="icon" href="/static/LOGO.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Lilita+One&family=Black+Ops+One&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="/static/js/react.min.js"></script>
<script src="/static/js/react-dom.min.js"></script>

<script>
(function(){
  var anims=['slideLeft','slideRight','slideUp','slideDown','fadeZoom','fadeRotate'];
  var picked=anims[Math.floor(Math.random()*anims.length)];
  document.documentElement.style.setProperty('--vt-old',picked+'Out');
  document.documentElement.style.setProperty('--vt-new',picked+'In');
})();
</script>
<style>
@view-transition{navigation:auto}
:root{view-transition-name:page-content;--vt-old:slideLeftOut;--vt-new:slideLeftIn}
::view-transition-old(page-content){animation:var(--vt-old) .4s ease-in forwards}
::view-transition-new(page-content){animation:var(--vt-new) .4s ease-out}
@keyframes slideLeftOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
@keyframes slideLeftIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRightOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
@keyframes slideRightIn{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUpOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
@keyframes slideUpIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDownOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(40px)}}
@keyframes slideDownIn{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeZoomOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.92)}}
@keyframes fadeZoomIn{from{opacity:0;transform:scale(1.08)}to{opacity:1;transform:scale(1)}}
@keyframes fadeRotateOut{from{opacity:1;transform:rotate(0) scale(1)}to{opacity:0;transform:rotate(-2deg) scale(0.95)}}
@keyframes fadeRotateIn{from{opacity:0;transform:rotate(2deg) scale(1.05)}to{opacity:1;transform:rotate(0) scale(1)}}
:root{
  --teal-1:#4a9ec4;
  --teal-2:#0d3b66;
  --teal-3:#0a2a4a;
  --teal-soft:#d6e8f5;
  --teal-glow:rgba(13,59,102,0.3);
  --ink:#2a2a3a;
  --ink-dim:#0a2a4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{width:100%;height:100%;}body{width:100%;min-height:100%;overflow:auto;font-family:'Poppins',sans-serif;}
body{
  background:#f0f2f5;
  color:var(--ink);
  user-select:none;-webkit-user-select:none;
}
::selection{background:rgba(13,59,102,0.4);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px;}
.glass{background:#fff;border:1.5px solid rgba(0,0,0,0.06);}
.glass-hover:hover{background:#f0f5fa;border-color:rgba(13,59,102,0.25);}
.glass-dark{background:#fff;border:2px solid var(--teal-3);border-radius:20px;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,0.06);}
.neon-glow{box-shadow:0 0 20px rgba(13,59,102,0.15),0 0 60px rgba(13,59,102,0.05);}
.neon-border{border:1.5px solid rgba(13,59,102,0.2);}
.shimmer{background:linear-gradient(90deg,transparent,rgba(13,59,102,0.06),transparent);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.shimmer-gold{}
.rarity-common{border-color:#6b7280;color:#6b7280;}
.rarity-rare{border-color:#3b82f6;color:#3b82f6;box-shadow:0 0 12px rgba(59,130,246,0.2);}
.rarity-epic{border-color:#8b5cf6;color:#8b5cf6;box-shadow:0 0 16px rgba(139,92,246,0.25);}
.rarity-legendary{border-color:#f59e0b;color:#f59e0b;box-shadow:0 0 20px rgba(245,158,11,0.3);animation:legendaryGlow 2s ease-in-out infinite;}
@keyframes legendaryGlow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.3);}50%{box-shadow:0 0 40px rgba(245,158,11,0.5);}}
.card-enter{animation:cardIn 0.6s cubic-bezier(.22,1,.36,1) both;}
@keyframes cardIn{0%{opacity:0;transform:translateY(30px) scale(0.95);}100%{opacity:1;transform:translateY(0) scale(1);}}

/* ── SCROLL REVEAL ── */
.sr{opacity:0;transform:translateY(40px);transition:all .7s cubic-bezier(.22,1,.36,1);}
.sr.sr-left{transform:translateX(-50px) translateY(0);}
.sr.sr-right{transform:translateX(50px) translateY(0);}
.sr.sr-scale{transform:scale(0.9) translateY(0);}
.sr.sr-up{transform:translateY(50px);}
.sr.visible{opacity:1;transform:translate(0) scale(1);}

/* ── STAGGER CHILDREN ── */
.stagger-children .sr:nth-child(1){transition-delay:.05s;}
.stagger-children .sr:nth-child(2){transition-delay:.1s;}
.stagger-children .sr:nth-child(3){transition-delay:.15s;}
.stagger-children .sr:nth-child(4){transition-delay:.2s;}
.stagger-children .sr:nth-child(5){transition-delay:.25s;}
.stagger-children .sr:nth-child(6){transition-delay:.3s;}
.stagger-children .sr:nth-child(7){transition-delay:.35s;}
.stagger-children .sr:nth-child(8){transition-delay:.4s;}
.stagger-children .sr:nth-child(9){transition-delay:.45s;}
.stagger-children .sr:nth-child(10){transition-delay:.5s;}
.stagger-children .sr:nth-child(11){transition-delay:.55s;}
.stagger-children .sr:nth-child(12){transition-delay:.6s;}

/* ── TAB CONTENT TRANSITION ── */
.tab-content{animation:tabSlideIn .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes tabSlideIn{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}

/* ── BOUNCE IN ── */
.bounce-in{animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.3);}50%{opacity:1;}100%{transform:scale(1);}}

/* ── POP IN ── */
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);}}

/* ── SLIDE IN FROM LEFT/RIGHT ── */
.slide-in-left{animation:slideInLeft .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideInLeft{0%{opacity:0;transform:translateX(-40px);}100%{opacity:1;transform:translateX(0);}}
.slide-in-right{animation:slideInRight .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideInRight{0%{opacity:0;transform:translateX(40px);}100%{opacity:1;transform:translateX(0);}}

/* ── FLOAT ANIMATION ── */
.float{animation:floatAnim 3s ease-in-out infinite;}
@keyframes floatAnim{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── GLOW PULSE ── */
.glow-pulse{animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(74,158,196,0.2);}50%{box-shadow:0 0 25px rgba(74,158,196,0.4);}}

/* ── NUMBER COUNT UP ── */
.count-up{animation:countPulse .3s ease-out;}
@keyframes countPulse{0%{transform:scale(1.3);color:#4a9ec4;}100%{transform:scale(1);}}
.countdown{font-variant-numeric:tabular-nums;}
.ripple{position:relative;overflow:hidden;}
.ripple::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.08);transform:scale(0);border-radius:50%;opacity:0;transition:all 0.5s;}
.ripple:active::after{transform:scale(2);opacity:1;transition:0s;}
.coin-fly{position:fixed;pointer-events:none;z-index:9999;font-size:1.2rem;animation:coinFly 0.8s ease-out forwards;}
@keyframes coinFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3);}}
.shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.confetti-piece{position:fixed;pointer-events:none;z-index:9998;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}100%{opacity:0;transform:translateY(400px) rotate(720deg) scale(0.5);}}
.skeleton{background:linear-gradient(90deg,rgba(13,59,102,0.04),rgba(13,59,102,0.08),rgba(13,59,102,0.04));background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:8px;}
.page-transition{position:fixed;inset:0;z-index:9999;pointer-events:none;background:#f0f2f5;opacity:1;transition:opacity .5s ease;}
.page-transition.fade-out{opacity:0;}
.toast{position:fixed;bottom:30px;right:30px;z-index:10000;padding:14px 24px;border-radius:12px;background:#fff;border:2px solid #0d3b66;color:#2a2a3a;font-weight:700;font-size:.85rem;transform:translateX(120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 30px rgba(0,0,0,0.12);}
.toast.show{transform:translateX(0);}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
/* ── EXISTING FLEX EFFECTS ── */
.profile-title{
  font-family:'Black Ops One',cursive;
  font-size:0.55rem;letter-spacing:2px;
  padding:2px 10px 1px;border-radius:4px;
  margin-left:0;margin-top:1px;
  background:linear-gradient(90deg,#ff6b6b,#f59e0b,#22d3ee,#a78bfa,#ff6b6b);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleRainbow 1.5s linear infinite;text-shadow:none;display:inline-block;position:relative;
  filter:drop-shadow(0 0 6px rgba(245,158,11,0.4));
}
.profile-title::after{
  content:attr(data-text);position:absolute;left:2px;top:2px;z-index:-1;
  background:linear-gradient(90deg,#f59e0b,#ff6b6b,#a78bfa);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleRainbow 1.5s linear infinite reverse;
  filter:blur(8px) brightness(1.5);opacity:0.7;pointer-events:none;
}
@keyframes titleRainbow{
  0%{background-position:0% 50%;}100%{background-position:300% 50%;}
}
@keyframes goldShimmer{
  0%{background-position:0% 50%;}100%{background-position:400% 50%;}
}
@keyframes flameSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes holoShift{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
/* ── PREVIEW CARD EFFECTS ── */
@keyframes rainbowGrad{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
@keyframes flameBorderAnim{0%{border-color:#f97316;box-shadow:0 0 10px #f97316aa,0 0 20px #f9731655;}50%{border-color:#ef4444;box-shadow:0 0 18px #ef4444aa,0 0 36px #ef444455;}100%{border-color:#f97316;box-shadow:0 0 10px #f97316aa,0 0 20px #f9731655;}}
.flame-border{animation:flameBorderAnim 1.2s ease-in-out infinite;}
.flame-border .preview-tag{background:#1c0800;border-color:#f9731655;color:#f97316;}
@keyframes electricBorderAnim{0%{border-color:#06b6d4;box-shadow:0 0 10px #06b6d4aa,0 0 20px #06b6d455;}50%{border-color:#22d3ee;box-shadow:0 0 20px #22d3eeaa,0 0 40px #22d3ee66;}100%{border-color:#06b6d4;box-shadow:0 0 10px #06b6d4aa,0 0 20px #06b6d455;}}
.electric-border{animation:electricBorderAnim 0.8s ease-in-out infinite;}
.electric-border .preview-tag{background:#001c1f;border-color:#06b6d455;color:#06b6d4;}
.shooting-stars{position:relative;overflow:hidden;}
.star-dot{position:absolute;width:3px;height:3px;background:#e0e0ff;border-radius:50%;animation:starTwinkle var(--dur,1.5s) ease-in-out infinite;animation-delay:var(--delay,0s);}
@keyframes starTwinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:1;transform:scale(1.2);}}
.shooting-trail{position:absolute;width:40px;height:2px;background:linear-gradient(90deg,transparent,#a78bfa,#38bdf8);border-radius:2px;animation:shootingStar 3s ease-in infinite;animation-delay:var(--delay,0s);}
@keyframes shootingStar{0%{transform:translate(-10px,10px) rotate(45deg);opacity:0;}20%{opacity:1;}100%{transform:translate(120px,-80px) rotate(45deg);opacity:0;}}
@keyframes icePulse{0%,100%{border-color:#bae6fd55;box-shadow:0 0 8px #bae6fd22;}50%{border-color:#bae6fd;box-shadow:0 0 20px #bae6fd55;}}
.ice-border{animation:icePulse 2s ease-in-out infinite;}
.ice-border .preview-username{color:#bae6fd;text-shadow:0 0 6px #bae6fd88;}
.ice-border .preview-tag{background:#00101f;border-color:#bae6fd44;color:#bae6fd;}
/* ── NEW EFFECTS ── */
@keyframes bloodMoonBorder{0%,100%{border-color:#7f1d1d;box-shadow:0 0 10px #dc262644,0 0 25px #7f1d1d33;}50%{border-color:#dc2626;box-shadow:0 0 20px #dc2626aa,0 0 50px #dc262666,inset 0 0 20px #dc262611;}}
@keyframes bloodDrip{0%{background-position:0% 0%;}100%{background-position:0% 100%;}}
.blood-moon{animation:bloodMoonBorder 1.8s ease-in-out infinite;}
.blood-moon .preview-username{background:linear-gradient(180deg,#fca5a5,#dc2626,#7f1d1d);background-size:100% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:bloodDrip 2s ease-in-out infinite alternate;}
.blood-moon .preview-tag{background:#1a0000;border-color:#dc262655;color:#fca5a5;}
@keyframes voidWarp{0%{filter:blur(0px) brightness(1);}25%{filter:blur(0.5px) brightness(0.7);}50%{filter:blur(0px) brightness(1.2);}75%{filter:blur(0.3px) brightness(0.8);}100%{filter:blur(0px) brightness(1);}}
@keyframes voidBorder{0%,100%{border-color:#4c1d95;box-shadow:0 0 15px #4c1d9577,inset 0 0 30px #4c1d9522;}33%{border-color:#6d28d9;box-shadow:0 0 25px #6d28d9aa,inset 0 0 40px #6d28d933;}66%{border-color:#0c0010;box-shadow:0 0 5px #4c1d9533;}}
.void-card{animation:voidBorder 2.5s ease-in-out infinite;}
.void-card .preview-username{color:#a78bfa;animation:voidWarp 3s ease-in-out infinite;text-shadow:0 0 15px #7c3aed;}
.void-card .preview-tag{background:#0c0010;border-color:#4c1d9555;color:#7c3aed;}
@keyframes holoBg{0%{opacity:0.15;transform:translateX(-100%) skewX(-10deg);}50%{opacity:0.35;}100%{opacity:0.15;transform:translateX(200%) skewX(-10deg);}}
.holo-card{border-color:#e0e0ff33;}
.holo-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,transparent 30%,#f0abfc44 40%,#38bdf844 50%,#4ade8044 60%,transparent 70%);animation:holoBg 2.5s ease-in-out infinite;}
.holo-card .preview-username{background:linear-gradient(90deg,#f0abfc,#38bdf8,#4ade80,#facc15,#f0abfc);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:holoShift 2s linear infinite;}
.holo-card .preview-tag{background:linear-gradient(90deg,#1a0020,#001520);border-color:#f0abfc44;color:#f0abfc;}
.matrix-card{position:relative;overflow:hidden;}
.matrix-card .preview-username{color:#4ade80;text-shadow:0 0 8px #4ade80;font-family:monospace;letter-spacing:2px;}
.matrix-card .preview-tag{background:#001200;border-color:#4ade8055;color:#4ade80;font-family:monospace;}
@keyframes angelGlow{0%,100%{box-shadow:0 0 15px #ffffff33,0 0 30px #fde68a22;border-color:#fde68a55;}50%{box-shadow:0 0 30px #ffffffaa,0 0 60px #fde68a55,inset 0 0 20px #ffffff11;border-color:#fde68a;}}
@keyframes angelFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.angel-card{animation:angelGlow 2.5s ease-in-out infinite;}
.angel-card .card-preview-top{animation:angelFloat 2.5s ease-in-out infinite;}
.angel-card .preview-username{background:linear-gradient(90deg,#fde68a,#ffffff,#fde68a);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 3s linear infinite;}
.angel-card .preview-tag{background:#1a1600;border-color:#fde68a55;color:#fde68a;}
@keyframes demonFlicker{0%,95%,100%{opacity:1;}96%{opacity:0.7;}97%{opacity:1;}98%{opacity:0.5;}}
@keyframes demonBorder{0%{border-color:#dc2626;box-shadow:0 0 15px #dc2626aa,0 0 30px #991b1b55;}33%{border-color:#7f1d1d;box-shadow:0 0 5px #dc262633;}66%{border-color:#f97316;box-shadow:0 0 20px #f97316aa,0 0 40px #f9731655;}100%{border-color:#dc2626;box-shadow:0 0 15px #dc2626aa,0 0 30px #991b1b55;}}
.demon-card{animation:demonBorder 0.8s ease-in-out infinite;}
.demon-card .preview-username{background:linear-gradient(90deg,#dc2626,#f97316,#fde68a,#f97316,#dc2626);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 1s linear infinite,demonFlicker 5s steps(1) infinite;}
.demon-card .preview-tag{background:#1a0000;border-color:#dc262655;color:#f97316;}
@keyframes orbit{0%{transform:rotate(0deg) translateX(22px) rotate(0deg);}100%{transform:rotate(360deg) translateX(22px) rotate(-360deg);}}
@keyframes orbit2{0%{transform:rotate(120deg) translateX(22px) rotate(-120deg);}100%{transform:rotate(480deg) translateX(22px) rotate(-480deg);}}
@keyframes orbit3{0%{transform:rotate(240deg) translateX(22px) rotate(-240deg);}100%{transform:rotate(600deg) translateX(22px) rotate(-600deg);}}
@keyframes nebulaPulse{0%,100%{background-position:0% 50%;opacity:0.08;}50%{background-position:100% 50%;opacity:0.15;}}
.galaxy-card{border-color:#312e81;}
.galaxy-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 30% 50%,#4f46e522 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,#0891b222 0%,transparent 60%);animation:nebulaPulse 4s ease-in-out infinite;}
.galaxy-card .preview-avatar::before{content:'🌟';position:absolute;font-size:6px;animation:orbit 2s linear infinite;}
.galaxy-card .preview-avatar::after{content:'⭐';position:absolute;font-size:5px;animation:orbit2 3s linear infinite;}
.galaxy-card .preview-username{background:linear-gradient(90deg,#818cf8,#e0e7ff,#a5f3fc,#818cf8);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:holoShift 3s linear infinite;}
.galaxy-card .preview-tag{background:#0c0a1e;border-color:#4f46e555;color:#818cf8;}
@keyframes neonFlicker{0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 4px #ff6ec7,0 0 10px #ff6ec7,0 0 20px #ff6ec7aa;color:#ff6ec7;}20%,24%,55%{text-shadow:none;color:#ff6ec766;}}
@keyframes neonBorderFlicker{0%,19%,21%,23%,25%,54%,56%,100%{border-color:#ff6ec7;box-shadow:0 0 10px #ff6ec7aa,0 0 25px #ff6ec755,inset 0 0 10px #ff6ec711;}20%,24%,55%{border-color:#ff6ec733;box-shadow:none;}}
.neon-card{animation:neonBorderFlicker 4s linear infinite;}
.neon-card .preview-username{animation:neonFlicker 4s linear infinite;-webkit-text-fill-color:unset;}
.neon-card .preview-tag{background:#1a0012;border-color:#ff6ec755;color:#ff6ec7;}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100%);}}
@keyframes cyberGlitch{0%,88%,100%{clip-path:none;transform:none;}90%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);transform:translateX(-3px);}92%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translateX(3px);}94%{clip-path:none;transform:none;}}
.cyber-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000022 2px,#00000022 4px);pointer-events:none;animation:scanline 4s linear infinite;opacity:0.3;}
.cyber-card .preview-username{color:#facc15;text-shadow:2px 0 #f97316,-2px 0 #06b6d4;animation:cyberGlitch 5s steps(1) infinite;-webkit-text-fill-color:unset;}
.cyber-card .preview-tag{background:#0d0d00;border-color:#facc1555;color:#facc15;font-family:monospace;}
.cyber-card{border-color:#facc1555;}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:1;}100%{transform:translateY(80px) rotate(360deg) translateX(20px);opacity:0;}}
.sakura-card{border-color:#fbcfe855;}
.sakura-petal{position:absolute;font-size:10px;pointer-events:none;animation:petalFall var(--dur,2s) ease-in infinite;animation-delay:var(--d,0s);}

{% include 'interval_tracker.html' %}
<div id="app">
<div class="page-transition" id="pageTransition"></div>
<div id="root"></div>
<div id="toastContainer" class="toast" style="display:none"></div>

<script>
window.USER={display_name:"{{ user.display_name|default:user.username|escapejs }}",title:"{{ user.title|escapejs }}",flex_effect:"{{ user.flex_effect|escapejs }}",name_effect:"{{ user.name_effect|escapejs }}",avatar_border:"{{ user.avatar_border|escapejs }}",bg_effect:"{{ user.bg_effect|escapejs }}",has_avatar:{{ user.avatar_base64|yesno:"true,false" }}};
document.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){document.getElementById('pageTransition')?.classList.add('fade-out');},50);

  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  function initScrollReveal(){document.querySelectorAll('.sr:not(.visible)').forEach(el=>obs.observe(el));}
  window.__initScrollReveal=initScrollReveal;
  setTimeout(initScrollReveal,100);

  const mutationObs=new MutationObserver(()=>{setTimeout(initScrollReveal,50);});
  mutationObs.observe(document.getElementById('root'),{childList:true,subtree:true});
});
</script>
