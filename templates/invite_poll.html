<script>
(function(){
  var uid='{{ request.user.id|default:"0" }}';
  if(!uid||uid==='0')return;
  uid=Number(uid);
  var seenMsgIds=new Set();
  try{
    var sms=JSON.parse(localStorage.getItem('chatx_seen_msg_ids')||'[]');
    sms.forEach(function(id){seenMsgIds.add(id);});
  }catch(e){}
  function persistMsgId(id){
    seenMsgIds.add(id);
    try{
      var arr=JSON.parse(localStorage.getItem('chatx_seen_msg_ids')||'[]');
      if(!arr.includes(id)){arr.push(id);localStorage.setItem('chatx_seen_msg_ids',JSON.stringify(arr));}
    }catch(e){}
  }
  if(!window.seenInviteRoomCodes)window.seenInviteRoomCodes=new Set();
  if(!window.declinedInvites){
    window.declinedInvites=new Set();
    try{
      var saved=JSON.parse(localStorage.getItem('chatx_declined')||'[]');
      saved.forEach(function(c){window.declinedInvites.add(c);});
    }catch(e){}
  }
  // Restore from localStorage
  try {
    var stored=JSON.parse(localStorage.getItem('seenInviteCodes_'+uid)||'[]');
    stored.forEach(function(c){window.seenInviteRoomCodes.add(c);});
  } catch(e){}
  function markSeen(code){
    try {
      var key='seenInviteCodes_'+uid;
      var arr=JSON.parse(localStorage.getItem(key)||'[]');
      if(!arr.includes(code)){arr.push(code);localStorage.setItem(key,JSON.stringify(arr));}
    } catch(e){}
  }
  function markDeclined(code){
    if(window.declinedInvites){
      window.declinedInvites.add(code);
      try{localStorage.setItem('chatx_declined',JSON.stringify(Array.from(window.declinedInvites)));}catch(e){}
    }
  }
  setInterval(function(){
    fetch('/chatx/conversations/').then(function(r){return r.json();}).then(function(d){
      if(!d.conversations)return;
      d.conversations.forEach(function(c){
        if(!c.last_message||!c.last_message.match(/Multiplayer Arena Invite/))return;
        fetch('/chatx/messages/'+c.user_id+'/').then(function(r){return r.json();}).then(function(md){
          if(!md.messages)return;
          for(var i=md.messages.length-1;i>=0;i--){
            var m=md.messages[i];
            if(m.deleted||m.sender_id===uid)continue;
            if(seenMsgIds.has(m.id))continue;
            persistMsgId(m.id);
            var match=m.content&&m.content.match(/Multiplayer Arena Invite! Room: (\w+)/);
            if(match&&!window.seenInviteRoomCodes.has(match[1])&&!window.declinedInvites.has(match[1])){
              window.seenInviteRoomCodes.add(match[1]);
              markSeen(match[1]);
              showInvPopup(m.sender_name,match[1],m.sender_id,m.has_avatar);
            }
          }
        }).catch(function(){});
      });
    }).catch(function(){});
  },5000);
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function showInvPopup(name,code,senderId,hasAvatar){
    var avHtml=senderId&&hasAvatar?'<img src="/api/shop/avatar/?user_id='+senderId+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;border:2px solid rgba(124,92,252,0.3)">':'<div style="width:48px;height:48px;border-radius:50%;background:rgba(124,92,252,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;color:#7c5cfc">'+esc(name[0]||'?')+'</div>';
    var o=document.createElement('div');
    o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:10000;display:flex;align-items:center;justify-content:center;';
    var b=document.createElement('div');
    b.style.cssText='background:rgba(10,5,15,0.95);border:1px solid rgba(124,92,252,0.3);border-radius:16px;padding:28px 32px;max-width:380px;width:90%;text-align:center;font-family:inherit;';
    b.innerHTML='<div style="font-size:2.5rem;margin-bottom:12px">🎮</div>'+avHtml+'<div style="color:#7c5cfc;font-weight:700;font-size:.9rem;margin-bottom:4px">ARENA INVITE</div><div style="color:#e8e0d0;font-size:.85rem;margin-bottom:16px"><strong style="color:#fff">'+esc(name)+'</strong> invited you to a multiplayer match!</div><div style="display:flex;gap:10px;justify-content:center"><a href="/multiplayer/?room='+code+'" style="padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#7c5cfc,#00d4aa);color:#fff;text-decoration:none;font-size:.8rem;font-weight:600">Join Arena</a><button data-code="'+code+'" style="padding:10px 24px;border-radius:10px;background:rgba(255,255,255,0.06);border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:.8rem;font-family:inherit">Decline</button></div>';
    o.appendChild(b);
    o.addEventListener('click',function(e){
      if(e.target===o){o.remove();return;}
      if(e.target.tagName==='BUTTON'&&e.target.getAttribute('data-code')){
        var code=e.target.getAttribute('data-code');
        markDeclined(code);window.seenInviteRoomCodes.add(code);o.remove();
      }
    });
    document.body.appendChild(o);
    setTimeout(function(){if(o.parentNode)o.remove();},30000);
  }
})();
</script>
