{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Black+Ops+One&family=Lilita+One&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1929;color:#e8e0d0;font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;user-select:none;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:url('/static/BG.png') center/cover no-repeat;filter:blur(12px) brightness(0.7);}
.game-wrap{width:100%;max-width:480px;margin-top:56px;padding:32px 28px;background:#0d3b66;border:1px solid #1d4d6b;border-radius:24px;text-align:center;position:relative;overflow:hidden;z-index:1}
.game-wrap::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 0,rgba(74,158,196,0.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(74,158,196,0.02) 0%,transparent 50%);pointer-events:none;z-index:0}
.game-wrap>*{position:relative;z-index:1}
h1{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:rgba(255,255,255,0.2);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase}
.target-bar{display:none;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;padding:6px 14px;background:rgba(74,158,196,0.04);border:1px solid rgba(74,158,196,0.06);border-radius:10px}
.target-bar.show{display:flex}
.target-label{font-size:.65rem;color:rgba(74,158,196,0.3);letter-spacing:1px;text-transform:uppercase}
.target-value{font-size:.95rem;font-weight:700;color:#4a9ec4}
.stats{display:flex;justify-content:center;gap:30px;margin-bottom:12px}
.stat{text-align:center}
.stat-num{font-size:1.3rem;font-weight:700;color:#4a9ec4}
.stat-label{font-size:.6rem;color:rgba(74,158,196,0.3);text-transform:uppercase;letter-spacing:1px}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:320px;margin:0 auto 16px}
.cell{aspect-ratio:1;border-radius:12px;background:rgba(40,35,50,0.15);border:1px solid rgba(74,158,196,0.08);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;cursor:pointer;transition:all .2s;min-height:85px}
.cell:hover{background:rgba(60,50,70,0.2)}
.cell.x{color:#a855f7;text-shadow:0 0 20px rgba(168,85,247,0.2)}
.cell.o{color:#22c55e;text-shadow:0 0 20px rgba(34,197,94,0.2)}
.cell.win{background:rgba(74,158,196,0.08);border-color:rgba(74,158,196,0.15);box-shadow:0 0 20px rgba(74,158,196,0.05)}
.cell.disabled{cursor:not-allowed;opacity:0.6}
.status{font-size:.85rem;font-weight:500;color:rgba(74,158,196,0.3);margin-bottom:14px;min-height:24px}
.controls{display:flex;gap:10px;justify-content:center}
.btn{padding:8px 22px;border:1px solid rgba(74,158,196,0.08);border-radius:10px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.btn-primary{background:linear-gradient(135deg,rgba(74,158,196,0.15),rgba(74,158,196,0.06));color:#4a9ec4}
.btn-primary:hover{background:linear-gradient(135deg,rgba(74,158,196,0.25),rgba(74,158,196,0.12));border-color:rgba(74,158,196,0.12)}
.btn-secondary{background:rgba(40,35,50,0.15);color:rgba(74,158,196,0.25);border-color:rgba(74,158,196,0.04)}
.btn-secondary:hover{background:rgba(60,50,70,0.2);color:rgba(74,158,196,0.4)}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:1000;animation:overFade .3s ease}
@keyframes overFade{0%{opacity:0}100%{opacity:1}}
.overlay.show{display:flex}
.over-card{background:#0d3b66;border:1px solid #1d4d6b;border-radius:20px;padding:30px 34px 26px;max-width:380px;width:90%;text-align:center;animation:cardPop .4s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 16px 60px rgba(0,0,0,0.6);z-index:2}
@keyframes cardPop{0%{opacity:0;transform:scale(0.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.over-icon{font-size:3rem;margin-bottom:4px;display:block}
.over-title{font-size:1.4rem;font-weight:700;color:#f0e8d0;margin-bottom:4px}
.over-sub{font-size:.8rem;color:rgba(74,158,196,0.3);margin-bottom:10px}
.over-result{display:none;padding:8px;border-radius:8px;font-size:.75rem;font-weight:600;margin-bottom:10px}
.over-result.passed{display:block;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.1);color:#22c55e}
.over-result.failed{display:block;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.1);color:#f87171}
.over-actions{display:flex;gap:8px;justify-content:center;margin-top:4px}
.over-btn{padding:9px 24px;border:1px solid rgba(74,158,196,0.08);border-radius:10px;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,rgba(74,158,196,0.15),rgba(74,158,196,0.06));color:#4a9ec4;font-family:'Inter',sans-serif}
.over-btn:hover{background:linear-gradient(135deg,rgba(74,158,196,0.25),rgba(74,158,196,0.12));border-color:rgba(74,158,196,0.12)}
.over-btn.primary{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.08);color:#22c55e}
.over-btn.primary:hover{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.12)}
.over-btn.secondary{background:rgba(168,85,247,0.06);border-color:rgba(168,85,247,0.08);color:#a855f7}
.over-btn.secondary:hover{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.12)}
@media(max-width:400px){
  .stats{flex-wrap:wrap;gap:6px}
  .stat-num{font-size:.85rem}
  .result-modal{padding:14px;max-width:95%}
  .result-modal .grid{grid-template-columns:1fr}
  .words-box{padding:8px 10px;min-height:70px}
}
</style>
<style>
.chillx-header{position:fixed;top:0;left:0;right:0;z-index:10000;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#0d3b66;border-bottom:2px solid #1d4d6b;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:transform 0.3s ease;}
.chillx-header.hidden{transform:translateY(-100%);}
.chillx-header .left{display:flex;align-items:center;gap:10px;}
.chillx-back{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#fff;border:1.5px solid #0a2a4a;color:#0a2a4a;text-decoration:none;font-size:.78rem;transition:all .25s;cursor:pointer;}
.chillx-back:hover{background:#d6e8f5;color:#2a2a3a;transform:scale(1.05);}
.chillx-brand{display:flex;align-items:center;gap:8px;font-family:'Black Ops One',cursive;font-size:.95rem;color:#2a2a3a;text-shadow:0 1px 0 rgba(255,255,255,0.4);}
.chillx-brand img{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#d6e8f5,#bedbf0);border:2px solid #0d3b66;padding:2px;}
.chillx-header .right{display:flex;align-items:center;gap:6px;}
.chillx-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:linear-gradient(180deg,#4a9ec4,#0d3b66);border:1.5px solid #0a2a4a;border-radius:14px;color:#2a2a3a;font-family:'Black Ops One',cursive;font-size:.72rem;box-shadow:inset 0 1px 0 rgba(255,255,255,0.4);}
.chillx-pill i{font-size:.65rem;}
.chillx-toggle{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#fff;border:1.5px solid #0a2a4a;color:#0a2a4a;cursor:pointer;font-size:.78rem;transition:all .25s;text-decoration:none;}
.chillx-toggle:hover{background:#d6e8f5;color:#2a2a3a;}
</style>
</head>
<body>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="chillx-header" id="chillxHeader">
  <div class="left">
    <a href="{% url 'dashboard' %}" class="chillx-back" title="Back to Dashboard"><i class="fas fa-arrow-left"></i></a>
    <div class="chillx-brand"><img src="{% static 'LOGO.png' %}" alt="ChillX"><span>CHILLX · TICTACTOE</span></div>
  </div>
  <div class="right">
    <span class="chillx-pill"><i class="fas fa-hashtag"></i> TICTACTOE</span>
    <button class="chillx-toggle" id="hideHeaderBtn" title="Hide header (H)"><i class="fas fa-eye-slash"></i></button>
    <a href="{% url 'dashboard' %}" class="chillx-toggle" title="Exit (Esc)"><i class="fas fa-times"></i></a>
  </div>
</div>

<div class="game-wrap">
  <h1>❌ Tic Tac Toe</h1>
  <div class="target-bar" id="targetBar">
    <span class="target-label">Goal</span>
    <span class="target-value" id="targetDisplay">Beat the AI</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="wins">0</div><div class="stat-label">Wins</div></div>
    <div class="stat"><div class="stat-num" id="losses">0</div><div class="stat-label">Losses</div></div>
    <div class="stat"><div class="stat-num" id="draws">0</div><div class="stat-label">Draws</div></div>
  </div>
  <div class="status" id="status">Your turn (X)</div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    <button class="btn btn-secondary" onclick="resetScore()">Reset Score</button>
  </div>
</div>

<div class="overlay" id="resultOverlay">
  <div class="over-card">
    <span class="over-icon" id="resultIcon">🎉</span>
    <div class="over-title" id="resultTitle">You Win!</div>
    <div class="over-sub" id="resultSub">Great job!</div>
    <div class="over-result" id="resultStatus"></div>
    <div class="over-actions" id="resultActions">
      <button class="over-btn" onclick="closeResult()">Play Again</button>
    </div>
  </div>
</div>


<script>
var board=['','','','','','','','','']
var currentPlayer='X',gameActive=true
var wins=0,losses=0,draws=0
var winCombos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]
var challengeTarget=null,challengeId=null,resultType=null


function init(){
  var p=new URLSearchParams(window.location.search)
  if(p.get('target')){challengeTarget=p.get('target');document.getElementById('targetBar').classList.add('show');document.getElementById('targetDisplay').textContent=challengeTarget.replace('_',' ')}
  if(p.get('challenge'))challengeId=p.get('challenge')
  initBoard()
}

function initBoard(){
  var b=document.getElementById('board');b.innerHTML=''
  for(var i=0;i<9;i++){
    var c=document.createElement('div');c.className='cell';c.dataset.idx=i
    c.addEventListener('click',function(){makeMove(parseInt(this.dataset.idx))})
    b.appendChild(c)
  }
  resetGame()
}

function makeMove(idx){
  if(!gameActive||board[idx]!=='')return
  board[idx]=currentPlayer
  var cell=document.querySelectorAll('.cell')[idx]
  cell.textContent=currentPlayer;cell.className='cell '+currentPlayer.toLowerCase()
  cell.classList.add('disabled')
  var result=checkWin()
  if(result){
    endGame(result)
    return
  }
  if(board.every(function(c){return c!==''})){
    draws++;document.getElementById('draws').textContent=draws
    resultType='draw'
    showResult('🤝','Draw!','Nobody wins this round.')
    return
  }
  currentPlayer=currentPlayer==='X'?'O':'X'
  document.getElementById('status').textContent=currentPlayer==='X'?'Your turn (X)':'AI thinking (O)...'
  if(currentPlayer==='O')setTimeout(aiMove,400)
}

function aiMove(){
  if(!gameActive)return
  // Win
  for(var i=0;i<9;i++){
    if(board[i]===''){board[i]='O';if(checkWin()){board[i]='';makeMove(i);return};board[i]=''}
  }
  // Block
  for(var i=0;i<9;i++){
    if(board[i]===''){board[i]='X';if(checkWin()){board[i]='';makeMove(i);return};board[i]=''}
  }
  // Center
  if(board[4]===''){makeMove(4);return}
  // Opp corners
  var corners=[0,2,6,8]
  for(var i=0;i<corners.length;i++){
    if(board[corners[i]]===''&&board[4]==='O'){makeMove(corners[i]);return}
  }
  // Random
  var empty=[]
  for(var i=0;i<9;i++){if(board[i]==='')empty.push(i)}
  if(empty.length>0)makeMove(empty[Math.floor(Math.random()*empty.length)])
}

function checkWin(){
  for(var i=0;i<winCombos.length;i++){
    var a=winCombos[i][0],b=winCombos[i][1],c=winCombos[i][2]
    if(board[a]&&board[a]===board[b]&&board[a]===board[c])return winCombos[i]
  }
  return null
}

function endGame(combo){
  gameActive=false
  for(var i=0;i<combo.length;i++){
    document.querySelectorAll('.cell')[combo[i]].classList.add('win')
  }
  if(currentPlayer==='X'){
    wins++;document.getElementById('wins').textContent=wins
    resultType='win'
    document.getElementById('status').textContent='You win!'
    showResult('🎉','You Win!','X takes the victory!')
  } else {
    losses++;document.getElementById('losses').textContent=losses
    resultType='lose'
    document.getElementById('status').textContent='AI wins!'
    showResult('😵','AI Wins!','O outsmarted you this time.')
  }
}

function showResult(icon,title,sub){
  document.getElementById('resultIcon').textContent=icon
  document.getElementById('resultTitle').textContent=title
  document.getElementById('resultSub').textContent=sub
  document.getElementById('resultStatus').className='over-result'
  var acts=document.getElementById('resultActions')
  acts.innerHTML='<button class="over-btn" onclick="closeResult()">Play Again</button>'
  if(challengeId&&resultType==='win'){
    var btn=document.createElement('button')
    btn.className='over-btn primary'
    btn.textContent='✓ Submit Result'
    btn.onclick=function(){submitResult()}
    acts.appendChild(btn)
  } else if(challengeId){
    var btn=document.createElement('button')
    btn.className='over-btn'
    btn.textContent='Submit Anyway'
    btn.onclick=function(){submitResult()}
    acts.appendChild(btn)
  }
  document.getElementById('resultOverlay').classList.add('show')
}

function submitResult(){
  var passed=resultType==='win'
  document.getElementById('resultStatus').textContent=passed?'Challenge Passed! Well done!':'Failed — you need to beat the AI'
  document.getElementById('resultStatus').className='over-result '+(passed?'passed':'failed')
  document.getElementById('resultActions').innerHTML='<button class="over-btn" onclick="closeResult()">Play Again</button>'
  if(passed){
    var backBtn=document.createElement('button')
    backBtn.className='over-btn secondary'
    backBtn.textContent='← Back to Challenges'
    backBtn.onclick=function(){window.location.href='{% url "challenges" %}'}
    document.getElementById('resultActions').appendChild(backBtn)
  }
  var xhr=new XMLHttpRequest()
  xhr.open('POST','/challenges/verify-tictactoe/',true)
  xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded')
  xhr.setRequestHeader('X-CSRFToken',getCSRF())
   xhr.onload=function(){
      if(xhr.status===200){
        var d;
        try { d = JSON.parse(xhr.responseText); } catch(e) { console.error('JSON parse error', e); return; }
        if(d.passed&&d.status==='completed'){
         document.getElementById('resultStatus').textContent='✓ Completed! +'+d.xp+' XP, Rs '+d.coins
         document.getElementById('resultStatus').className='over-result passed'
         document.getElementById('resultActions').innerHTML=''
         setTimeout(function(){
           if(window.opener&&!window.opener.closed)window.opener.location.reload()
           window.close()
         },2000)
       }
     }
   }
  xhr.send('challenge_id='+challengeId+'&won='+(passed?'true':'false')+'&wins='+wins+'&losses='+losses)
}

function getCSRF(){
  var name='csrftoken',m=document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)')
  return m?m.pop():''
}

function closeResult(){
  document.getElementById('resultOverlay').classList.remove('show')
  resetGame()
}

function resetGame(){
  board=['','','','','','','','','']
  currentPlayer='X';gameActive=true;resultType=null
  document.getElementById('status').textContent='Your turn (X)'
  document.getElementById('resultStatus').className='over-result'
  var cells=document.querySelectorAll('.cell')
  for(var i=0;i<cells.length;i++){cells[i].textContent='';cells[i].className='cell'}
}

function resetScore(){
  wins=0;losses=0;draws=0
  document.getElementById('wins').textContent='0'
  document.getElementById('losses').textContent='0'
  document.getElementById('draws').textContent='0'
  resetGame()
}

init()
</script>

<script>(function(){var h=document.getElementById('chillxHeader'),b=document.getElementById('hideHeaderBtn');if(!h||!b)return;b.addEventListener('click',function(){h.classList.toggle('hidden');b.innerHTML=h.classList.contains('hidden')?'<i class="fas fa-eye"></i>':'<i class="fas fa-eye-slash"></i>';});})();</script>
</body>
</html>
