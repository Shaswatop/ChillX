{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aim Trainer 3D — ChillX</title>
<link rel="icon" href="/static/LOGO.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Black+Ops+One&family=Lilita+One&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --teal-1: #4a9ec4;
  --teal-2: #0d3b66;
  --teal-3: #0a2a4a;
  --teal-soft: #d6e8f5;
  --teal-glow: rgba(13,59,102, 0.3);
  --ink: #2a2a3a;
  --ink-dim: #0a2a4a;
  --ink-mute: #3a6a7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: #0a1929;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url('/static/BG.png') center/cover no-repeat;
  filter: blur(12px) brightness(0.7);
}

.chillx-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10000;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #0d3b66;
  border-bottom: 2px solid #1d4d6b;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}

.chillx-header.hidden { transform: translateY(-100%); }

.chillx-header .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.chillx-back {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d3b66;
  border: 1.5px solid #1d4d6b;
  color: #d6e8f5;
  text-decoration: none;
  font-size: 0.78rem;
  transition: all 0.25s;
  cursor: pointer;
}

.chillx-back:hover {
  background: #1d4d6b;
  color: #fff;
  transform: scale(1.05);
}

.chillx-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Black Ops One', cursive;
  font-size: 0.95rem;
  color: var(--ink);
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
}

.chillx-brand img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-soft), #bedbf0);
  border: 2px solid var(--teal-2);
  padding: 2px;
}

.chillx-header .right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.chillx-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: linear-gradient(180deg, var(--teal-1), var(--teal-2));
  border: 1.5px solid var(--teal-3);
  border-radius: 14px;
  color: var(--ink);
  font-family: 'Black Ops One', cursive;
  font-size: 0.72rem;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}

.chillx-pill i { font-size: 0.65rem; }

.chillx-toggle {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 1.5px solid var(--teal-3);
  color: var(--ink-dim);
  cursor: pointer;
  font-size: 0.78rem;
  transition: all 0.25s;
}

.chillx-toggle:hover {
  background: var(--teal-soft);
  color: var(--ink);
}

.aim-app-wrap {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow: hidden;
}

.aim-app-wrap iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #0f1115;
}

  .aim-fullscreen .chillx-header { display: none; }
.aim-fullscreen .aim-app-wrap { top: 0; }

.opp-tracker{position:fixed;top:12px;right:12px;width:130px;background:#0d3b66;border:1px solid #1d4d6b;border-radius:8px;padding:6px 10px;z-index:1000;display:none}
.opp-tracker.show{display:block}
.op-label{font-size:.5rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.op-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:4px}
.op-bar-inner{height:100%;background:#7c5cfc;border-radius:2px;transition:width .3s;width:0%}
.op-val{font-size:.55rem;color:rgba(255,255,255,0.4);font-weight:500}
@media(max-width:400px){
  .stats{flex-wrap:wrap;gap:6px}
  .stat-num{font-size:.85rem}
  .result-modal{padding:14px;max-width:95%}
  .result-modal .grid{grid-template-columns:1fr}
  .words-box{padding:8px 10px;min-height:70px}
}
</style>
</head>

      var style = doc.createElement('style');
      style.id = 'chillx-gold-theme';
      style.textContent = css;

      // Re-style any link to "index.html" so back goes to parent
      var links = doc.querySelectorAll('a[href*="index.html"], a[href*="../"], a.back, a.go-back');
      links.forEach(function(a) {
        a.addEventListener('click', function(ev) {

        });
      });

      // Some AIM trainers have an Escape handler; ensure parent nav works
      doc.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          // Don't double-fire; only navigate if not in a sub-state
        }
      });
    } catch (err) {

  // Press H to toggle, Esc to exit

<div class="challenge-bar" id="challengeBar">
  <span>🎯 Target: <span class="target"><span id="targetDisplay">{{ request.GET.target }}</span> pts</span></span>
  <span style="font-size:.65rem;opacity:0.6">Play, then submit your score</span>
</div>

<div class="challenge-overlay" id="challengeOverlay">
  <div class="challenge-card">
    <h2>Results</h2>
    <div class="score" id="submitScore">—</div>
    <div class="detail" id="submitDetail">Accuracy: — | Hits: —</div>
    <div class="result" id="submitResult"></div>
    <div>
      <button class="btn btn-submit" id="submitBtn" onclick="submitAimScore()">✓ Submit Score</button>
      <button class="btn btn-back" onclick="window.location.href='/challenges/'">← Back</button>
    </div>
  </div>
</div>

<script>
var challengeId="{{ request.GET.challenge }}",challengeTarget=parseInt("{{ request.GET.target }}")||0,scorePoll=null,lastScore=null,lastAcc="—",lastHits=0

function pollResults(){
  try{
    var doc=document.getElementById('aimFrame').contentDocument
    if(!doc)return
    var overlay=doc.getElementById('resultsOverlay')
    if(overlay&&!overlay.classList.contains('hidden')){
      var s=doc.getElementById('resultsScore'),a=doc.getElementById('resultsAccuracy'),h=doc.getElementById('resultsHits')
      if(s&&s.textContent!=='0'){
        lastScore=parseInt(s.textContent)||0;lastAcc=(a?a.textContent:'—');lastHits=parseInt(h?h.textContent:'0')||0
        document.getElementById('submitScore').textContent=lastScore+' pts'
        document.getElementById('submitDetail').textContent='Accuracy: '+lastAcc+' | Hits: '+lastHits
        if(lastScore>=challengeTarget)document.getElementById('submitScore').style.color='#22c55e'
        document.getElementById('challengeOverlay').classList.add('show')
        if(scorePoll){clearInterval(scorePoll);scorePoll=null}
      }
    }
  }catch(e){}
}

if(challengeId){scorePoll=setInterval(pollResults,800);document.getElementById('challengeBar').style.display='flex'}

function submitAimScore(){
  if(!lastScore){document.getElementById('submitResult').textContent='Finish a round first!';document.getElementById('submitResult').className='result failed';return}
  var xhr=new XMLHttpRequest()
  xhr.open('POST','/challenges/verify-aim3d/',true)
  xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded')
  xhr.setRequestHeader('X-CSRFToken',getCSRF())
  xhr.onload=function(){
    if(xhr.status===200){
      var d=JSON.parse(xhr.responseText)
      document.getElementById('submitResult').textContent=d.passed?'✓ Completed! +'+d.xp+' XP, Rs '+d.coins:'Failed — '+lastScore+'/'+challengeTarget
      document.getElementById('submitResult').className='result '+(d.passed?'passed':'failed')
      document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').style.opacity=0.5
       if(d.passed)setTimeout(function(){if(window.opener&&!window.opener.closed)window.opener.location.reload();window.close()},2000)
    }
  }
  xhr.send('challenge_id='+challengeId+'&score='+lastScore+'&target='+challengeTarget+'&accuracy='+encodeURIComponent(lastAcc)+'&hits='+lastHits)
}

function getCSRF(){var n='csrftoken',m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?m.pop():''}
</script>
{% endif %}

<script>
// ── Multiplayer postMessage API ──
var aimTarget = parseInt("{{ request.GET.target }}") || 100;
function sendProgress(data){
  window.parent.postMessage({type:'progress', data:data}, '*');
}
function sendComplete(data){
  window.parent.postMessage({type:'complete', data:data}, '*');
}
// Progress polling — reads score from nested game iframe every 500ms
var aimProgressTimer = setInterval(function(){
  try{
    var doc = document.getElementById('aimFrame').contentDocument;
    if(!doc)return;
    var menuOv = doc.getElementById('menuOverlay');
    var resOv = doc.getElementById('resultsOverlay');
    if(menuOv && resOv && menuOv.classList.contains('hidden') && resOv.classList.contains('hidden')){
      var sv = doc.getElementById('scoreValue');
      if(sv){
        var sc = parseInt(sv.textContent) || 0;
        var pct = aimTarget > 0 ? Math.min(100, Math.round(sc / aimTarget * 100)) : 0;
        sendProgress({current_score:sc, target_score:aimTarget, score:sc, target:aimTarget, percent_complete:pct});
      }
    } else if (resOv && !resOv.classList.contains('hidden')) {
      // Game ended — results overlay visible, send final result
      var s = doc.getElementById('resultsScore');
      var a = doc.getElementById('resultsAccuracy');
      var h = doc.getElementById('resultsHits');
      if (s) {
        var finalScore = parseInt(s.textContent) || 0;
        var finalAcc = a ? a.textContent : '0%';
        var finalHits = h ? (parseInt(h.textContent) || 0) : 0;
        clearInterval(aimProgressTimer);
        aimProgressTimer = null;
        sendComplete({current_score:finalScore, score:finalScore, accuracy:finalAcc, hits:finalHits, target:aimTarget});
      }
    }
  }catch(e){}
}, 500);
window.addEventListener('message', function(e){
  var msg = e.data || {};
  if(msg.type === 'opponent_progress'){
    var d = msg.data || {};
    document.getElementById('oppBar').style.width = (d.percent_complete || 0) + '%';
    document.getElementById('oppVal').textContent = 'Score ' + (d.current_score||d.score||0) + '/' + (d.target_score||d.target||1000);
    document.getElementById('oppTracker').classList.add('show');
  } else if(msg.type === 'start'){
    document.getElementById('aimFrame').contentWindow.postMessage({type:'start', challenge: msg.challenge || {}}, '*');
  }
});
window.parent.postMessage({type:'ready'}, '*');
</script>

</body>
</html>
